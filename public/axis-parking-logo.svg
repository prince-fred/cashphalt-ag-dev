<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <!-- Font Definitions -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&amp;display=swap');
      .axis { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 72px; fill: #121212; letter-spacing: 2px; }
      .parking { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 50px; fill: #121212; letter-spacing: 4px; }
    </style>
  </defs>

  <!-- AXIS PARKING Text -->
  <text x="5" y="70">
    <tspan class="axis">AXIS</tspan>
    <tspan class="parking" dx="15">PARKING</tspan>
  </text>
  
  <!-- Underline across the whole text -->
  <rect x="5" y="85" width="375" height="5" fill="#DB9C1B"/>
</svg>
