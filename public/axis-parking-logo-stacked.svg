<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="100%" height="100%">
  <!-- Font Definitions -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&amp;display=swap');
      .axis { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 64px; fill: #121212; letter-spacing: 2px; }
      .parking { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 24px; fill: #121212; letter-spacing: 8px; }
    </style>
  </defs>

  <g transform="translate(10, 0)">
    <!-- AXIS Text -->
    <text x="90" y="70" class="axis" text-anchor="middle">AXIS</text>
    
    <!-- Underline -->
    <rect x="0" y="85" width="180" height="6" fill="#DB9C1B"/>
    
    <!-- PARKING Text -->
    <text x="90" y="125" class="parking" text-anchor="middle">PARKING</text>
  </g>
</svg>
